name: Project Pipeline

on:
  push:
    branches: ["main", "devops", "developer"] # فقط وقتی روی main پوش شد
  pull_request:
    branches: ["main"] # یا وقتی PR به main زده شد

jobs:
  # بخش اول: تست و بیلد اولیه (CI)
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # کد رو از گیت‌هاب بردار بذار روی این سیستم مجازی
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build # مطمئن می‌شیم کد ایراد تایپی یا ساختاری نداره

  # بخش دوم: دیپلوی روی ورسل (CD)
    # بخش دوم: دیپلوی روی ورسل (CD)
  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  
